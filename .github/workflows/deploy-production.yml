name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: partsanj-production
  cancel-in-progress: false

env:
  PARTSANJ_API_IMAGE: ghcr.io/amirhosseinhamidian/partsanj-api:${{ github.sha }}
  PARTSANJ_WEB_IMAGE: ghcr.io/amirhosseinhamidian/partsanj-web:${{ github.sha }}
  PARTSANJ_MIGRATE_IMAGE: ghcr.io/amirhosseinhamidian/partsanj-migrate:${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push production images
        run: |
          docker compose \
            -f docker-compose.production.yml \
            --profile tools \
            build --push \
            api web migrate

      - name: Configure SSH
        run: |
          install -m 700 -d "$HOME/.ssh"

          printf '%s\n' \
            "${{ secrets.PROD_SSH_PRIVATE_KEY }}" \
            > "$HOME/.ssh/id_ed25519"

          chmod 600 "$HOME/.ssh/id_ed25519"

          printf '%s\n' \
            "${{ secrets.PROD_KNOWN_HOSTS }}" \
            > "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy release to production
        run: |
          printf '%s\n' "${{ github.token }}" |
          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -p "${{ secrets.PROD_PORT }}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "deploy ${{ github.sha }} ${{ github.actor }}"

      - name: Verify public endpoints
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 5 \
            --retry-all-errors \
            https://api.partsanj.ir/api/v1/health \
            > /dev/null

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 10 \
            --retry-delay 5 \
            --retry-all-errors \
            https://partsanj.ir \
            > /dev/null
